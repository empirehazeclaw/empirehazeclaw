<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Revenue Dashboard - EmpireHazeClaw</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-card: #1a1a24;
            --primary: #00ff88;
            --secondary: #ff3366;
            --accent: #7c3aed;
            --text: #fff;
            --text-dim: #888;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 2rem;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        h1 { 
            color: var(--primary); 
            margin-bottom: 2rem;
            font-size: 2rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .card {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .card h2 {
            color: var(--text-dim);
            font-size: 0.875rem;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        
        .card .value {
            font-size: 2.5rem;
            font-weight: bold;
        }
        
        .card .value.positive { color: var(--primary); }
        
        .source {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .source:last-child { border-bottom: none; }
        
        .source-name { color: var(--text-dim); }
        .source-amount { font-weight: bold; }
        
        .btn {
            background: var(--primary);
            color: var(--bg);
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 1rem;
        }
        
        .timestamp {
            color: var(--text-dim);
            font-size: 0.75rem;
            margin-top: 2rem;
        }
        
        .error { color: var(--secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Revenue Dashboard</h1>
        
        <div class="grid">
            <div class="card">
                <h2>Gesamtumsatz</h2>
                <div class="value positive" id="total">Lädt...</div>
            </div>
            
            <div class="card">
                <h2>LemonSqueezy</h2>
                <div class="value" id="lemon">Lädt...</div>
            </div>
            
            <div class="card">
                <h2>Stripe</h2>
                <div class="value" id="stripe">Lädt...</div>
            </div>
            
            <div class="card">
                <h2>Diesen Monat</h2>
                <div class="value" id="monthly">Lädt...</div>
            </div>
        </div>
        
        <div class="grid" style="margin-top: 1.5rem">
            <div class="card">
                <h2>Nach Quelle</h2>
                <div id="sources">
                    <div class="source">
                        <span class="source-name">LemonSqueezy</span>
                        <span class="source-amount" id="lemon-source">€0</span>
                    </div>
                    <div class="source">
                        <span class="source-name">Stripe</span>
                        <span class="source-amount" id="stripe-source">€0</span>
                    </div>
                    <div class="source">
                        <span class="source-name">Etsy</span>
                        <span class="source-amount" id="etsy-source">€0</span>
                    </div>
                    <div class="source">
                        <span class="source-name">Printify</span>
                        <span class="source-amount" id="printify-source">€0</span>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2>Letzte Bestellungen</h2>
                <div id="orders">
                    <p style="color: var(--text-dim)">Lädt...</p>
                </div>
            </div>
        </div>
        
        <button class="btn" onclick="refresh()">🔄 Aktualisieren</button>
        
        <p class="timestamp" id="timestamp"></p>
    </div>
    
    <script>
        async function getRevenue() {
            try {
                const response = await fetch('/scripts/revenue_api.py');
                const data = await response.json();
                return data;
            } catch (e) {
                console.error('Error:', e);
                return null;
            }
        }
        
        async function refresh() {
            // Try to fetch from API
            try {
                const response = await fetch('/scripts/revenue_api.py');
                const data = await response.json();
                
                document.getElementById('total').textContent = '€' + (data.total || 0).toFixed(2);
                document.getElementById('monthly').textContent = '€' + (data.monthly || 0).toFixed(2);
                document.getElementById('lemon').textContent = '€' + (data.sources.lemon || 0).toFixed(2);
                document.getElementById('stripe').textContent = '€' + (data.sources.stripe || 0).toFixed(2);
                
                document.getElementById('lemon-source').textContent = '€' + (data.sources.lemon || 0).toFixed(2);
                document.getElementById('stripe-source').textContent = '€' + (data.sources.stripe || 0).toFixed(2);
                
            } catch (e) {
                // Show demo data
                document.getElementById('total').textContent = '€0';
                document.getElementById('monthly').textContent = '€0';
                document.getElementById('lemon').textContent = '€0';
                document.getElementById('stripe').textContent = '€0';
                document.getElementById('orders').innerHTML = '<p style="color: var(--text-dim)">Noch keine Bestellungen</p>';
            }
            
            document.getElementById('timestamp').textContent = 'Stand: ' + new Date().toLocaleString('de-DE');
        }
        
        refresh();
    </script>
</body>
</html>
