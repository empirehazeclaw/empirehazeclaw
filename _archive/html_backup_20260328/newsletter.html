<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter - EmpireHazeClaw</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-card: #16161f;
            --accent: #00ff88;
            --text: #ffffff;
            --text-secondary: #8b8b9a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { font-family: 'Syne', sans-serif; color: var(--accent); font-size: 1.8em; margin-bottom: 10px; }
        p { color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6; }
        .input-group { margin-bottom: 16px; }
        input {
            width: 100%;
            padding: 14px 16px;
            background: #12121a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
        }
        input:focus { outline: none; border-color: var(--accent); }
        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
        }
        button:hover { transform: scale(1.02); }
        button:disabled { opacity: 0.5; }
        .success { background: rgba(0,255,136,0.1); border: 1px solid var(--accent); padding: 16px; border-radius: 8px; display: none; }
        .success h3 { color: var(--accent); margin-bottom: 8px; }
        .footer { margin-top: 20px; font-size: 0.85em; }
        .footer a { color: var(--accent); }
    </style>
</head>
<body>
    <div class="card">
        <h1>📧 Newsletter</h1>
        <p>Erhalte wöchentlich Updates zu neuen Features, Blog Posts und exklusiven Angeboten!</p>
        
        <div id="form">
            <div class="input-group">
                <input type="email" id="email" placeholder="Deine Email-Adresse" required>
            </div>
            <div class="input-group">
                <input type="text" id="name" placeholder="Dein Name (optional)">
            </div>
            <button id="submitBtn" onclick="subscribe()">Abonnieren</button>
        </div>
        
        <div class="success" id="success">
            <h3>✅ Abonnement erfolgreich!</h3>
            <p>Du erhälst jetzt unseren wöchentlichen Newsletter.</p>
        </div>
        
        <div class="footer">
            <a href="/datenschutz.html">Datenschutz</a> | <a href="/impressum.html">Impressum</a>
        </div>
    </div>
    
    <script>
        async function subscribe() {
            const email = document.getElementById('email').value;
            const name = document.getElementById('name').value || 'Abonnent';
            const btn = document.getElementById('submitBtn');
            
            if (!email) { alert('Bitte Email eingeben'); return; }
            
            btn.disabled = true;
            btn.textContent = 'Wird gesendet...';
            
            // Save to localStorage (for now - would need backend)
            const subscribers = JSON.parse(localStorage.getItem('newsletter_subs') || '[]');
            
            if (subscribers.find(s => s.email === email)) {
                alert('Diese Email ist bereits registriert!');
                btn.disabled = false;
                btn.textContent = 'Abonnieren';
                return;
            }
            
            subscribers.push({ email, name, date: new Date().toISOString() });
            localStorage.setItem('newsletter_subs', JSON.stringify(subscribers));
            
            document.getElementById('form').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        }
    </script>
</body>
</html>
