    <style>
        :root { --primary: #00ff88; --primary-glow: rgba(0, 255, 136, 0.4); --bg-dark: #0a0a0f; --bg-card: #12121a; --text: #ffffff; --text-muted: #8888aa; --gradient: linear-gradient(135deg, #00ff88 0%, #00ccff 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 20%, rgba(0, 255, 136, 0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(0, 204, 255, 0.05) 0%, transparent 50%); pointer-events: none; z-index: -1; }
        
        h1, h2, h3 { font-family: 'Syne', sans-serif; font-weight: 700; line-height: 1.1; }
        h1 { font-size: clamp(2rem, 6vw, 3.5rem); background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
        
        nav { position: fixed; top: 0; left: 0; right: 0; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid rgba(0, 255, 136, 0.1); }
        .logo { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--text); text-decoration: none; }
        .logo span { color: var(--primary); }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        
        .lang-toggle { display: flex; gap: 0.5rem; align-items: center; }
        .lang-btn { padding: 0.3rem 0.6rem; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: var(--text-muted); border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: all 0.3s; }
        .lang-btn:hover, .lang-btn.active { border-color: var(--primary); color: var(--primary); }
        
        .hero { padding: 8rem 2rem 4rem; text-align: center; }
        .hero p { font-size: 1.25rem; color: var(--text-muted); max-width: 600px; margin: 0 auto 2rem; }
        
        .search { max-width: 600px; margin: 0 auto 3rem; padding: 0 2rem; }
        .search input { width: 100%; padding: 1rem 1.5rem; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--text); font-size: 1rem; }
        
        .categories { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 3rem; padding: 0 2rem; }
        .cat { padding: 0.5rem 1.5rem; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; color: var(--text-muted); cursor: pointer; transition: all 0.3s; }
        .cat:hover, .cat.active { border-color: var(--primary); color: var(--primary); }
        
        .content { max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        
        .card { background: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 1.5rem; transition: all 0.3s; text-decoration: none; display: block; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        
        .card-tag { display: inline-block; padding: 0.2rem 0.6rem; background: rgba(0, 255, 136, 0.1); border-radius: 100px; font-size: 0.7rem; color: var(--primary); margin-bottom: 0.5rem; }
        .card h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text); }
        .card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; }
        .card-meta { font-size: 0.75rem; color: var(--text-muted); }
        
        footer { padding: 3rem 2rem; border-top: 1px solid rgba(255, 255, 255, 0.05); text-align: center; color: var(--text-muted); }
        
        @media (max-width: 768px) { .nav-links { display: none; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

        <div class="categories">
            <span class="cat active" data-cat="all" data-de="Alle" data-en="All">Alle</span>
            <span class="cat" data-cat="ki" data-de="🤖 KI" data-en="🤖 AI">🤖 KI</span>
            <span class="cat" data-cat="trading" data-de="📈 Trading" data-en="📈 Trading">📈 Trading</span>
            <span class="cat" data-cat="business" data-de="💼 Business" data-en="💼 Business">💼 Business</span>
            <span class="cat" data-cat="discord" data-de="💬 Discord" data-en="💬 Discord">💬 Discord</span>
        </div>

    <div class="content">

    <footer>
        <p>© 2026 EmpireHazeClaw. <span data-de="Alle Rechte vorbehalten." data-en="All rights reserved.">Alle Rechte vorbehalten.</span></p>
    </footer>

    <script>
        const STORAGE_KEY = 'empirehazeclaw_blog_lang';
        
        const posts = [
            {title_de: "KI für KMU - Der Leitfaden", title_en: "AI for Small Business - The Guide", cat: "ki", url: "posts/ki-fuer-kmu.html", desc_de: "Wie kleine Unternehmen von KI profitieren können.", desc_en: "How small businesses can benefit from AI.", date: "2026-03-21"},
            {title_de: "KI für Anfänger Guide", title_en: "AI for Beginners Guide", cat: "ki", url: "posts/ki-fuer-anfaenger-guide.html", desc_de: "Der komplette Einstieg in KI für Anfänger.", desc_en: "The complete introduction to AI for beginners.", date: "2026-03-21"},
            {title_de: "Trading Bot Revolution 2026", title_en: "Trading Bot Revolution 2026", cat: "trading", url: "posts/trading-bot-revolution.html", desc_de: "Wie Trading Bots den Markt verändern.", desc_en: "How trading bots are changing the market.", date: "2026-03-18"},
            {title_de: "Discord Bot für Business", title_en: "Discord Bot for Business", cat: "discord", url: "posts/discord-bot-fuer-business.html", desc_de: "Automatisierung mit Discord Bots.", desc_en: "Automation with Discord Bots.", date: "2026-03-18"},
            {title_de: "KI Tools für Unternehmen", title_en: "AI Tools for Companies", cat: "ki", url: "posts/ki-tools-fuer-unternehmen.html", desc_de: "Die besten KI-Tools im Vergleich.", desc_en: "The best AI tools in comparison.", date: "2026-03-18"},
            {title_de: "SaaS mit 0€ Starten", title_en: "Start SaaS with 0€", cat: "business", url: "posts/saas-0-euro.html", desc_de: "Wie man mit minimalem Budget startet.", desc_en: "How to start with minimal budget.", date: "2026-03-22"},
            {title_de: "Die Zukunft der KI-Assistenten", title_en: "The Future of AI Assistants", cat: "ki", url: "posts/die-zukunft-der-ki-assistenten.html", desc_de: "Was kommt nach ChatGPT?", desc_en: "What comes after ChatGPT?", date: "2026-03-20"},
            {title_de: "Discord Bot Programmieren", title_en: "Discord Bot Programming", cat: "discord", url: "posts/discord-bot-programmieren.html", desc_de: "Schritt-für-Schritt Anleitung.", desc_en: "Step-by-step guide.", date: "2026-03-18"},
            {title_de: "KI Chatbot für Unternehmen", title_en: "AI Chatbot for Companies", cat: "ki", url: "posts/ki-chatbot-unternehmen.html", desc_de: "Support automatisieren mit Chatbots.", desc_en: "Automate support with chatbots.", date: "2026-03-18"},
            {title_de: "Trading Bot erstellen", title_en: "Create a Trading Bot", cat: "trading", url: "posts/trading-bot-erstellen.html", desc_de: "Von Null zum eigenen Trading Bot.", desc_en: "From zero to your own trading bot.", date: "2026-03-18"},
            {title_de: "ROI mit Chatbots", title_en: "ROI with Chatbots", cat: "ki", url: "posts/roi-chatbots.html", desc_de: "Wie man mit Chatbots Geld spart.", desc_en: "How to save money with chatbots.", date: "2026-03-18"},
            {title_de: "POD mit KI Guide", title_en: "POD with AI Guide", cat: "business", url: "posts/pod-mit-ki-guide.html", desc_de: "Print on Demand mit KI optimieren.", desc_en: "Optimize print on demand with AI.", date: "2026-03-18"},
            {title_de: "KI Transformation", title_en: "AI Transformation", cat: "ki", url: "posts/ki-unternehmen-revolutioniert.html", desc_de: "Wie KI Unternehmen transformiert.", desc_en: "How AI transforms companies.", date: "2026-03-20"},
            {title_de: "LLM Router Guide", title_en: "LLM Router Guide", cat: "ki", url: "posts/llm-router.html", desc_de: "Kosten sparen mit LLM Routern.", desc_en: "Save costs with LLM Routers.", date: "2026-03-20"},
            {title_de: "Security Audit", title_en: "Security Audit", cat: "business", url: "posts/security-audit.html", desc_de: "KI-Sicherheit für Unternehmen.", desc_en: "AI security for companies.", date: "2026-03-20"},
            {title_de: "Automation Guide", title_en: "Automation Guide", cat: "business", url: "posts/automation-guide-kmu.html", desc_de: "Business Prozesse automatisieren.", desc_en: "Automate business processes.", date: "2026-03-18"},
            {title_de: "KI Trends 2026", title_en: "AI Trends 2026", cat: "ki", url: "posts/ai-trends-2026.html", desc_de: "Die wichtigsten Trends im Jahr 2026.", desc_en: "The most important trends in 2026.", date: "2026-03-18"},
            {title_de: "Business 2026", title_en: "Business 2026", cat: "business", url: "posts/business-2026.html", desc_de: "Unternehmen im Jahr 2026.", desc_en: "Companies in 2026.", date: "2026-03-21"},
            {title_de: "Weekend Business", title_en: "Weekend Business", cat: "business", url: "posts/weekend-business.html", desc_de: "Side Business am Wochenende aufbauen.", desc_en: "Build a side business on weekends.", date: "2026-03-21"},
            {title_de: "Online Marketing", title_en: "Online Marketing", cat: "business", url: "posts/online-marketing.html", desc_de: "Digital Marketing Strategien.", desc_en: "Digital marketing strategies.", date: "2026-03-21"},
        ];
        
        let currentLang = 'de';
        
        function getDefaultLang() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) return stored;
            const browserLang = navigator.language || '';
            if (browserLang.toLowerCase().startsWith('de')) return 'de';
            return 'en';
        }
        
        function setLang(lang) {
            localStorage.setItem(STORAGE_KEY, lang);
            currentLang = lang;
            applyLang(lang);
        }
        
        function applyLang(lang) {
            document.documentElement.lang = lang;
            document.body.setAttribute('data-lang', lang);
            
            // Update text elements
            document.querySelectorAll('[data-de]').forEach(el => {
                const text = el.getAttribute(`data-${lang}`);
                if (text) el.textContent = text;
            });
            
            // Update title and meta
            const titleEl = document.querySelector('title');
            if (titleEl) {
                const title = titleEl.getAttribute(`data-${lang}`);
                if (title) titleEl.textContent = title;
            }
            
            const descEl = document.querySelector('meta[name="description"]');
            if (descEl) {
                const desc = descEl.getAttribute(`data-${lang}`);
                if (desc) descEl.content = desc;
            }
            
            // Update lang buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase() === lang) btn.classList.add('active');
            });
            
            renderPosts();
        }
        
        function renderPosts(filter = 'all') {
            const grid = document.getElementById('posts-grid');
            const filtered = filter === 'all' ? posts : posts.filter(p => p.cat === filter);
            
            grid.innerHTML = filtered.map(p => `
                <a href="${p.url}" class="card">
                    <span class="card-tag">${p.cat === 'ki' ? '🤖' : p.cat === 'trading' ? '📈' : p.cat === 'discord' ? '💬' : '💼'}</span>
                    <h3>${currentLang === 'de' ? p.title_de : p.title_en}</h3>
                    <p>${currentLang === 'de' ? p.desc_de : p.desc_en}</p>
                    <div class="card-meta">📅 ${p.date}</div>
                </a>
            `).join('');
        }
        
        document.querySelectorAll('.cat').forEach(cat => {
            cat.addEventListener('click', () => {
                document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
                cat.classList.add('active');
                renderPosts(cat.dataset.cat);
            });
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            currentLang = getDefaultLang();
            applyLang(currentLang);
        });
    </script>
</body>
</html>
