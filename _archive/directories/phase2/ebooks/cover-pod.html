<!DOCTYPE html>
<html>
<head>
<title>POD Business Cover</title>
<style>
body { margin: 0; padding: 0; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); height: 100vh; display: flex; justify-content: center; align-items: center; font-family: Arial, sans-serif; }
.cover { width: 1600px; height: 2560px; background: linear-gradient(180deg, #0f2027 0%, #203a43 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 100px; box-sizing: border-box; }
h1 { color: #38ef7d; font-size: 90px; margin: 0; text-transform: uppercase; letter-spacing: 8px; }
h2 { color: #fff; font-size: 45px; margin: 30px 0; font-weight: normal; }
p { color: #a0a0a0; font-size: 35px; margin: 20px 0; }
.icon { font-size: 150px; margin: 30px 0; }
.brand { position: absolute; bottom: 80px; color: #38ef7d; font-size: 30px; letter-spacing: 5px; }
</style>
</head>
<body>
<div class="cover">
<div class="icon">👕</div>
<h1>POD Business</h1>
<h2>Dein Guide zum passiven Einkommen</h2>
<p>Print-on-Demand Schritt für Schritt</p>
<p style="margin-top: 100px; font-size: 30px;">📖 198 Seiten</p>
<div class="brand">EMPIREHAZECLAW</div>
</div>
</body>
</html>
