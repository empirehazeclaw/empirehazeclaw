<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 EmpireHazeClaw CRM Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .header h1 { color: #00ff88; font-size: 2em; }
        .header .subtitle { color: #888; font-size: 0.9em; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card .value { font-size: 2.5em; font-weight: bold; color: #00ff88; }
        .stat-card .label { color: #888; margin-top: 5px; }
        .stat-card.warning .value { color: #ffaa00; }
        .stat-card.danger .value { color: #ff5555; }
        .section {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .section h2 { color: #00ff88; margin-bottom: 15px; font-size: 1.2em; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
        th { color: #888; font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .status-new { background: #1a4a1a; color: #00ff88; }
        .status-contacted { background: #2a2a4a; color: #8888ff; }
        .status-qualified { background: #3a2a1a; color: #ffaa00; }
        .status-proposal { background: #2a1a3a; color: #aa88ff; }
        .status-negotiating { background: #3a3a1a; color: #ffdd00; }
        .status-won { background: #004400; color: #00ff00; }
        .status-lost { background: #440000; color: #ff4444; }
        .status-bounced { background: #331111; color: #ff6666; }
        .industry-tag {
            background: rgba(0,255,136,0.1);
            color: #00ff88;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8em;
        }
        .refresh-btn {
            background: #00ff88;
            color: #0a0a0a;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .refresh-btn:hover { background: #00cc6a; }
        .last-updated { color: #666; font-size: 0.8em; text-align: right; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🦞 CRM Dashboard</h1>
            <div class="subtitle">EmpireHazeClaw - Lead Pipeline</div>
        </div>
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
    </div>

    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="value" id="total-leads">0</div>
            <div class="label">Total Leads</div>
        </div>
        <div class="stat-card">
            <div class="value" id="active-leads">0</div>
            <div class="label">Active Sequences</div>
        </div>
        <div class="stat-card warning">
            <div class="value" id="responses">0</div>
            <div class="label">Responses</div>
        </div>
        <div class="stat-card danger">
            <div class="value" id="bounced">0</div>
            <div class="label">Bounced</div>
        </div>
    </div>

    <div class="section">
        <h2>📊 Pipeline Status</h2>
        <div id="pipeline-summary"></div>
    </div>

    <div class="section">
        <h2>📋 Lead Details</h2>
        <table>
            <thead>
                <tr>
                    <th>Company</th>
                    <th>Email</th>
                    <th>Industry</th>
                    <th>Status</th>
                    <th>Last Contact</th>
                </tr>
            </thead>
            <tbody id="leads-table">
                <tr><td colspan="5">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="section">
        <h2>📬 Recent Responses</h2>
        <div id="responses-list">No responses yet.</div>
    </div>

    <div class="last-updated" id="last-updated"></div>

    <script>
        async function loadData() {
            try {
                const [leadsRes, sequencesRes, responsesRes, sentRes] = await Promise.all([
                    fetch('data/crm_leads.csv'),
                    fetch('data/email_sequences.json'),
                    fetch('data/responses.json'),
                    fetch('data/sent_emails.json')
                ]);
                
                const leadsText = await leadsRes.text();
                const sequences = await sequencesRes.json();
                const responses = await responsesRes.json();
                const sent = await sentRes.json();
                
                // Parse leads CSV
                const leads = [];
                const lines = leadsText.split('\n').filter(l => l.trim());
                const headers = lines[0].split(',');
                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(',');
                    const lead = {};
                    headers.forEach((h, idx) => lead[h.trim()] = values[idx]?.trim());
                    leads.push(lead);
                }
                
                // Count by status
                const statusCounts = {};
                const industryCounts = {};
                
                leads.forEach(lead => {
                    const email = lead.email;
                    const status = sequences[email]?.status || 'new';
                    statusCounts[status] = (statusCounts[status] || 0) + 1;
                    industryCounts[lead.industry] = (industryCounts[lead.industry] || 0) + 1;
                });
                
                // Update stats
                document.getElementById('total-leads').textContent = leads.length;
                document.getElementById('active-leads').textContent = Object.values(sequences).filter(s => s.status === 'active').length;
                document.getElementById('responses').textContent = responses.length;
                document.getElementById('bounced').textContent = sent.bounced?.length || 0;
                
                // Pipeline summary
                const pipelineDiv = document.getElementById('pipeline-summary');
                let pipelineHTML = '<div style="display:flex;gap:10px;flex-wrap:wrap;">';
                for (const [status, count] of Object.entries(statusCounts)) {
                    pipelineHTML += `<span class="status-badge status-${status}">${status}: ${count}</span>`;
                }
                pipelineHTML += '</div>';
                pipelineHTML += '<div style="margin-top:10px;color:#888;font-size:0.9em;">Industry Breakdown: ';
                for (const [ind, count] of Object.entries(industryCounts)) {
                    pipelineHTML += `<span class="industry-tag">${ind}: ${count}</span> `;
                }
                pipelineHTML += '</div>';
                pipelineDiv.innerHTML = pipelineHTML;
                
                // Leads table
                const tbody = document.getElementById('leads-table');
                let tableHTML = '';
                leads.slice(0, 20).forEach(lead => {
                    const email = lead.email;
                    const status = sequences[email]?.status || 'new';
                    const sentInfo = sent[email];
                    const lastContact = sentInfo ? new Date(sentInfo.sent_at).toLocaleDateString('de') : 'Never';
                    
                    tableHTML += `<tr>
                        <td>${lead.company || '-'}</td>
                        <td><a href="mailto:${email}" style="color:#00ff88;">${email}</a></td>
                        <td><span class="industry-tag">${lead.industry || '-'}</span></td>
                        <td><span class="status-badge status-${status}">${status}</span></td>
                        <td>${lastContact}</td>
                    </tr>`;
                });
                tbody.innerHTML = tableHTML;
                
                // Responses list
                const respDiv = document.getElementById('responses-list');
                if (responses.length > 0) {
                    let respHTML = '<ul style="list-style:none;">';
                    responses.slice(-5).reverse().forEach(r => {
                        respHTML += `<li style="padding:10px;border-bottom:1px solid #333;">
                            <strong style="color:#00ff88;">${r.from}</strong>
                            <div style="color:#888;font-size:0.85em;">${r.subject}</div>
                            <div style="color:#666;font-size:0.8em;">${r.date}</div>
                        </li>`;
                    });
                    respHTML += '</ul>';
                    respDiv.innerHTML = respHTML;
                }
                
                document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleString('de');
                
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }
        
        loadData();
        setInterval(loadData, 60000); // Auto-refresh every minute
    </script>
</body>
</html>
